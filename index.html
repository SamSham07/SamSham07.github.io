    <title>Ir. Ts. Sam Sham | Engineering Portfolio</title>
    <script>
      // GitHub Pages SPA fallback decoder — pairs with public/404.html.
      // Restores the original path that 404.html encoded into a query string.
      (function () {
        if (window.location.search.indexOf('/?/') !== -1 || window.location.search.indexOf('?/') === 0) {
          var search = window.location.search
          var i = search.indexOf('?/')
          if (i !== -1) {
            var decoded =
              search.slice(0, i) +
              search
                .slice(i + 2)
                .split('&')
                .map(function (s, idx) {
                  return idx === 0 ? '/' + s.replace(/~and~/g, '&') : s
                })
                .join('?')
            window.history.replaceState(null, '', window.location.pathname.slice(0, -1) + decoded + window.location.hash)
          }
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
